# /etc/nginx/conf.d/doctor-id-limits.conf
#
# Rate-limit zones must live in the http{} context — conf.d/*.conf is included
# there, so this file is the right home (a server{} block cannot declare a zone).
#
# These are the EDGE / first line of defense. The application's Upstash limiters
# (per-phone OTP, per-IP login, /api/v1) are the second line and the source of
# truth — see CLAUDE.md #21. Keep both: nginx sheds obvious floods cheaply before
# they ever reach Node; the app enforces the precise, stateful limits.
#
# Keyed on $binary_remote_addr = the real client IP, because the app is bound to
# 127.0.0.1 and only nginx can reach it (so $remote_addr here is the true client,
# not a spoofable forwarded header).

# General API surface (/api/*): tolerate normal SSR/AJAX bursts, shed floods.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Cap concurrent connections per IP (slow-loris / scraper hygiene).
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Return 429 (not the default 503) so clients/monitors read it correctly.
limit_req_status 429;
limit_conn_status 429;
