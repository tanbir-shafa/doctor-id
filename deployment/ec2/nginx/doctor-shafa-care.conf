# /etc/nginx/sites-available/doctor-shafa-care
#
# Hardened reverse proxy for doctor.shafa.care → the PM2-managed Next.js app on
# 127.0.0.1:3000. See CLAUDE.md #21 and doc/getting-started.md §11.5 for why the
# X-Real-IP forwarding and localhost binding are load-bearing for the abuse
# defenses. Rate-limit zones are defined in conf.d/doctor-id-limits.conf.
#
# Cert is obtained by bootstrap.sh via `certbot certonly --nginx` (+ a
# `systemctl reload nginx` deploy-hook for renewals); this file references the
# resulting paths. The --nginx authenticator injects its own ACME-challenge
# location at renewal time, so no webroot location is needed here — but the :80
# server block below MUST stay (the plugin attaches the challenge to it).

# ---- HTTP :80 — ACME attach point + permanent redirect to HTTPS -----------
server {
    listen      80;
    listen      [::]:80;
    server_name daktar.link www.daktar.link doctor.shafa.care www.doctor.shafa.care;
    location / {
        return 301 https://daktar.link$request_uri;
    }
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.daktar.link;

    ssl_certificate     /etc/letsencrypt/live/daktar.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daktar.link/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_trusted_certificate /etc/letsencrypt/live/daktar.link/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    return 301 https://daktar.link$request_uri;
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name doctor.shafa.care www.doctor.shafa.care;

    ssl_certificate     /etc/letsencrypt/live/doctor.shafa.care/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctor.shafa.care/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_trusted_certificate /etc/letsencrypt/live/doctor.shafa.care/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    return 301 https://daktar.link$request_uri;
}

# ---- HTTPS :443 — the app -------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name daktar.link;

    ssl_certificate     /etc/letsencrypt/live/daktar.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daktar.link/privkey.pem;
    # Mozilla "intermediate" — TLS 1.2 + 1.3 only, modern ciphers.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling (certbot writes chain.pem alongside the cert).
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/daktar.link/chain.pem;

    # Uploads pass through Server Actions (server-side S3). Must match
    # next.config.ts experimental.serverActions.bodySizeLimit ("12mb") or
    # profile-photo / selfie / Gov-ID uploads get a 413 at the proxy. (#17/#22)
    client_max_body_size 12m;

    # --- Security response headers (always = also on error responses) ---
    # HSTS: 2 years + preload. Safe only once the whole site is HTTPS — it is.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    # The registration flow uses getUserMedia for the live selfie — camera MUST
    # be allowed for same-origin. Microphone is not used; deny it.
    add_header Permissions-Policy        "camera=(self), microphone=()" always;
    # NOTE: a Content-Security-Policy is a worthwhile follow-up but needs Next's
    # nonce wiring to avoid breaking inline scripts — deliberately omitted here.

    # Don't advertise the nginx version.
    server_tokens off;

    # --- Proxy defaults inherited by both locations below ---
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;            # trusted client IP
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";                      # keepalive to upstream
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;

    # Per-IP connection ceiling (zone from conf.d).
    limit_conn perip 20;

    # gzip for text/JSON responses (Next sets immutable cache headers on
    # /_next/static itself, so we leave asset caching to the app).
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/manifest+json;

    # API surface: edge rate-limit as the first line of defense.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # Everything else (SSR pages, Server Actions, /_next/*, static).
    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
