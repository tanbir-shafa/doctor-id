# Local-only Mongo fallback for offline work.
# Primary dev uses the Atlas dev cluster via MONGO_URI in .env.local.
# Run with: `docker compose up -d mongo` then point MONGO_URI to mongodb://localhost:27017/doctor-id-dev

services:
  mongo:
    image: mongo:7
    container_name: doctor-id-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok } catch (e) {
            rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok
          }
        "
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mongo-data:
